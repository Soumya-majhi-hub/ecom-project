<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Minimal Frontend</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 0.95rem; }

        /* Brand New Search Box Container Styling */
        .search-container { max-width: 500px; margin: 0 auto 30px auto; display: flex; gap: 10px; }
        .search-input { flex-grow: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #ccd1d9; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: #3498db; }
        .search-btn { padding: 12px 24px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        .search-btn:hover { background-color: #2980b9; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #eef2f5; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .image-container { width: 100%; height: 180px; display: flex; justify-content: center; align-items: center; background: #fafafa; border-radius: 8px; margin-bottom: 15px; overflow: hidden; border: 1px solid #f0f0f0; }
        .image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .badge { background-color: #2ecc71; color: white; padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; align-self: flex-start; margin-bottom: 10px; }
        .badge.out { background-color: #e74c3c; }
        .title { font-size: 1.3rem; font-weight: 600; margin: 0 0 10px 0; color: #2c3e50; }
        .brand { font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .desc { font-size: 0.95rem; color: #555; line-height: 1.4; margin-bottom: 15px; flex-grow: 1; }
        .price-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f2f6; padding-top: 15px; }
        .price { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
        .qty { font-size: 0.85rem; color: #7f8c8d; }
    </style>
</head>
<body>

<h1>📦 E-Commerce Product Catalog</h1>
<p class="subtitle">(Search items dynamically or click cards for database payload records)</p>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Search by name, brand, or category...">
    <button onclick="executeSearch()" class="search-btn">Search</button>
</div>

<div class="product-grid" id="productContainer"></div>

<script>
    // Helper function that takes a list of products and draws them out on the screen
    function renderProductsList(products) {
        const container = document.getElementById('productContainer');
        container.innerHTML = '';

        if (products.length === 0) {
            container.innerHTML = `
                <p style="grid-column: 1/-1; text-align: center; color: #7f8c8d; font-size: 1.1rem; padding: 40px;">
                    No matching results found in the catalog directory.
                </p>`;
            return;
        }

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => showProductDetails(product.id);

            // Hits your single image streaming controller method!
            const imageUrl = `/api/products/${product.id}/image`;

            card.innerHTML = `
                <div>
                    <div class="image-container">
                        <img src="${imageUrl}" alt="${product.name}"
                             onerror="this.src='https://placehold.co/260x180?text=No+Image+Found'; this.onerror=null;">
                    </div>
                    <span class="badge ${product.available ? '' : 'out'}">${product.available ? 'In Stock' : 'Out of Stock'}</span>
                    <div class="brand">${product.brand || 'Generic'}</div>
                    <h2 class="title">${product.name}</h2>
                    <p class="desc">${product.description || 'No description provided.'}</p>
                </div>
                <div class="price-row">
                    <span class="price">$${product.price}</span>
                    <span class="qty">Qty: ${product.quantity}</span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 1. Initial baseline catalog fetch loop
    async function loadInitialCatalog() {
        try {
            const response = await fetch('/api/products');
            const data = await response.json();
            renderProductsList(data);
        } catch (error) {
            console.error("Initialization error:", error);
        }
    }

    // 2. NEW FUNCTION: Triggered when pressing the 'Search' button
    async function executeSearch() {
        const queryValue = document.getElementById('searchInput').value.trim();

        // If the search string is completely empty, default back to full list view
        if (!queryValue) {
            loadInitialCatalog();
            return;
        }

        try {
            // Hits your custom custom derived query repository mapping endpoint!
            const response = await fetch(`/api/products/search?keyword=${encodeURIComponent(queryValue)}`);
            const filteredData = await response.json();

            // Pass the custom query subset data back into our drawing grid engine
            renderProductsList(filteredData);
        } catch (error) {
            console.error("Search operations failure:", error);
            alert("Could not process query pipeline against server router mapping.");
        }
    }

    // Listen for the "Enter" keyboard key shortcut inside the input search field text field
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            executeSearch();
        }
    });

    // Load complete listing array on page startup boot
    loadInitialCatalog();

    // 3. Display single product details popup logic
    async function showProductDetails(id) {
        try {
            const response = await fetch(`/api/products/${id}`);
            const product = await response.json();
            alert(`Product Meta Entry Info:\n\nName: ${product.name}\nBrand: ${product.brand}\nCategory: ${product.category}\nPrice: $${product.price}\n\nJSON Data Array string:\n${JSON.stringify(product)}`);
        } catch (error) {
            console.error("Single target lookup dropped:", error);
        }
    }
</script>
</body>
</html>
